# Configurações para testes de integração com Testcontainers
spring.jpa.show-sql=false
spring.flyway.enabled=true

# Kafka desabilitado por padrão nos testes (habilitado via @SpringBootTest quando necessário)
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers:localhost:9092}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Motor scheduler desabilitado nos testes
motor.compra.cron=0 0 0 1 1 ? 2099

# COTAHIST aponta para src/test/resources
cotahist.diretorio=src/test/resources
